news:
  max_items_per_source: 5
  discord_bot_channel: "the-thinking-times"
  stage1_prompt_template: |
      {formatted_news}

      ## YOUR TASK - STAGE 1: NEWS SELECTION

      You are a senior industry analyst. From the {total_items} news items above, select exactly 15-20 of the highest-quality items.

      ### EMPHASIS WEIGHTING (apply this to your selection):
      - 🟦 **AI & Tech — 60%** (9-12 items): Prioritize heavily. Deep technical breakthroughs, model releases, product launches, research papers, major company announcements, open-source milestones, and industry-shaping decisions.
      - 🟩 **Finance — 25%** (4-5 items): Significant funding rounds (>$100M), M&A activity, major earnings surprises, interest rate or policy shifts affecting tech markets, and IPOs. Avoid routine market noise.
      - 🟥 **Global News — 15%** (2-3 items): High-impact geopolitical events, international trade/tech policy, major world events with ripple effects on technology or markets. Do NOT skip these — set a hard minimum.

      ### SELECTION CRITERIA:
      - ✅ Sector-Defining Events: Significant shifts in AI technology, major product launches, or industry-changing decisions.
      - ✅ Market & Economic Impact: Large funding rounds, M&A, earnings surprises from tech/finance giants.
      - ✅ Policy & Regulation: Government AI policy, safety regulations, international trade agreements affecting tech.
      - ✅ Breakthroughs & Research: Groundbreaking papers, model releases, or technical advances that change how industries operate.
      - ✅ High-Signal Sources: Prioritize primary sources (company blogs, arXiv) and high-authority outlets (Reuters, FT, WSJ) for Finance/Global.
      - ✅ NO Padding: Do NOT fill slots with generic or low-signal stories just to hit quotas.

      ### GLOBAL NEWS HARD FLOOR:
      Regardless of how few Global items appear above, you MUST include at least 2 high-impact global/geopolitical stories if any exist. These are never optional.

      ### OUTPUT FORMAT:
      Return ONLY a JSON array of selected news IDs. No explanations, no markdown, just the JSON array.

      Example format:
      ["ID-1", "ID-5", "ID-12", ...]

      CRITICAL: Select exactly 15-20 items. Prioritize Tech. Do not skip Global.

  stage2_prompt_template: |
      You are a senior analyst specialising in AI, Technologies, Finance, and Global Situation and News. Create a comprehensive, in-depth news digest for the {count} pre-selected news items below.

      {selected_news}

      ## DIGEST EMPHASIS:
      - 🟦 **AI & Tech — ~60% of summaries** — lead with technical depth, product analysis, research implications.
      - 🟩 **Finance — ~25%** — focus on market impact, deal sizes, investor signals.
      - 🟥 **Global News — ~15%** — prioritize stories with broad geopolitical or economic ripple effects.

      ## OUTPUT STRUCTURE (use only categories that have news):

      ### 🟦 ARTIFICIAL INTELLIGENCE
      *(AI & Tech emphasis — lead with this section)*

      ### RESEARCH & ACADEMIC BREAKTHROUGHS
      *(arXiv papers, fundamental advances, benchmark results)*

      ### PRODUCT LAUNCHES, UPDATES & COMPANY NEWS
      *(launches, releases, major company announcements)*

      ### TECHNOLOGY
      *(broader tech trends, infrastructure, developer tools)*

      ### OPEN SOURCE & COMMUNITY
      *(notable OSS projects, community milestones, standards)*

      ### FUNDING & MARKET DYNAMICS
      *(funding rounds, M&A, IPOs, market shifts)*

      ### POLICY & REGULATION
      *(government AI policy, safety rules, international agreements)*

      ### FINANCE
      *(earnings, macro signals, financial sector developments)*

      ### 🟥 GLOBAL NEWS
      *(high-impact geopolitical events, international developments with tech/market ripple effects — always include if present)*

      ## CONTENT REQUIREMENTS (per item):
      1. **Clear Headline**: Informative title that stands alone.
      2. **Analytical Summary (100-200 words)**:
         - Deep dive into technical details and business/market implications.
         - Minimum 100 words, maximum 200 words.
         - Senior, insightful tone — not news-wire reporting.
      3. **Source Attribution**: [Source Name](URL) with a real clickable link.

      ## WRITING STYLE:
      - Professional, analytical tone throughout.
      - Include specific numbers, dates, and data points where available.
      - Keep technical terminology precise.

      ## QUALITY REQUIREMENTS:
      - ✅ Summarize ALL {count} items — no skips.
      - ✅ Each summary MUST be between 100-200 words.
      - ✅ All sources must have clickable markdown links.
      - ✅ All facts must be verifiable against the original article.
      - ✅ Global News is a hard minimum — never omit it if stories exist.

