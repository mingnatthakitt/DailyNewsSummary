#  provider: nvidia
#  model: moonshotai/kimi-k2-instruct
#  base_url: https://integrate.api.nvidia.com/v1
  base_url: "https://generativelanguage.googleapis.com/v1beta/openai/"
  model: "gemini-flash-latest"

news:
  max_items_per_source: 5
  stage1_prompt_template: |
      {formatted_news}

      ## YOUR TASK - STAGE 1: NEWS SELECTION

      You are a senior industry analyst. Analyze the {total_items} news items above and select exactly 15-20 of the highest-quality items.

      ### SELECTION CRITERIA:
      - ✅ Sector-Defining Events: Significant shifts in AI technology, global financial markets, or major geopolitical developments.
      - ✅ Market & Economic Impact: Large funding rounds, M&A activities, interest rate shifts, or major earnings reports from tech/finance giants.
      - ✅ Policy & Regulation: Important changes in government policy, AI safety regulations, or international trade agreements.
      - ✅ Breakthroughs & Research: Groundbreaking technical papers or major product launches that change how industries operate.
      - ✅ Balanced Category Coverage: Ensure the digest includes a mix of AI & Tech, Finance, and World News (General) to provide a complete picture of the day.
      - ✅ High-Signal Sources: Prioritize high-authority reporting (e.g., Reuters, FT, WSJ) for world/finance news and primary sources for technical AI updates.
      - ✅ Global Context: Include significant international stories that have broader implications beyond their home region.

      ### OUTPUT FORMAT:
      Return ONLY a JSON array of selected news IDs. No explanations, no markdown, just the JSON array.

      Example format:
      ["ID-1", "ID-5", "ID-12", ...]

      CRITICAL: Select exactly 15-20 items.

  stage2_prompt_template: |
      You are a senior AI industry analyst. Create a comprehensive, in-depth news digest for the {count} pre-selected news items below.

      {selected_news}

      ## OUTPUT STRUCTURE:

      Organize news items into relevant categories (use only categories that have news):
      1. **Artificial Intelligence**
      2. **Research & Academic Breakthroughs**
      3. **Product Launches & Updates**
      4. **Technology*
      5. **Funding & Market Dynamics**
      6. **Policy & Regulation**
      7. **Open Source & Community**
      8. **Finance**
      9. **Global News**
      10. **General**

      ## CONTENT REQUIREMENTS:

      For each news item, provide:
      1. **Clear Headline**: Informative title
      2. **Analytical Summary (150-300 words)**:
         - Provide a deep dive into the technical details and business implications.
         - Minimum 150 words, maximum 300 words.
         - Ensure the tone is senior and insightful.
      3. **Source Attribution**: [Source Name](URL)

      ## WRITING STYLE:
      - Professional, analytical tone
      - Include specific numbers and data points
      - Keep technical terminology accurate

      ## QUALITY REQUIREMENTS:
      - ✅ Summarize ALL {count} items
      - ✅ Each summary MUST BE between 150-300 words.
      - ✅ All sources must have clickable markdown links

