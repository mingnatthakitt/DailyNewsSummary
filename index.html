<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Thinking Times | Daily AI News Summary</title>
    <meta name="description"
        content="Stay updated with the latest in tech, finance, and general news, summarized by AI.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;700&family=UnifrakturMaguntia&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="glass-bg"></div>

    <header>
        <div class="container top-bar">
            <div class="top-left">
                <div class="live-clock-container">
                    <span class="live-dot"></span>
                    <span id="live-time">00:00:00</span>
                    <button id="tz-toggle" class="tz-toggle">HKT</button>
                </div>
                <p id="date-display"></p>
            </div>
            <div id="stock-ticker" class="top-right stock-ticker">
                <p>Thinker Loading...</p>
            </div>
        </div>
        <div class="container masthead">
            <div class="logo">The Thinking Times</div>
        </div>
        <nav class="container">
            <ul class="nav-links">
                <li>AI</li>
                <li>Agents</li>
                <li>Research</li>
                <li>Product</li>
                <li>Infrastructure</li>
                <li>Funding</li>
                <li>Policy</li>
            </ul>
        </nav>
        <div class="container sub-nav">
            <button id="discord-btn" class="discord-btn">DISPATCH TO DISCORD</button>
        </div>
    </header>

    <main class="container">
        <div class="nyt-layout">
            <aside class="left-col">
                <div id="tech-news" class="column-section">
                    <h3 class="section-title">Tech Intelligence</h3>
                    <!-- News items injected here -->
                </div>
            </aside>

            <section class="center-col">
                <div id="featured-news">
                    <!-- Featured news injected here -->
                </div>
            </section>

            <aside class="right-col">
                <div id="general-news" class="column-section">
                    <h3 class="section-title">World & Market</h3>
                    <!-- General news injected here -->
                </div>
            </aside>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 The Thinking Times. Powered by Artificial Intelligence.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
