<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Thinking Times | Daily AI News Summary</title>
    <meta name="description"
        content="Stay updated with the latest in tech, finance, and general news, summarized by AI.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;700&family=UnifrakturMaguntia&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="glass-bg"></div>

    <header>
        <div class="container top-bar">
            <div class="top-left">
                <div class="live-clock-container">
                    <span class="live-dot"></span>
                    <span id="live-time">00:00:00</span>
                    <select id="tz-select" class="tz-select">
                        <option value="0">UTC</option>
                        <option value="1">UTC+1</option>
                        <option value="2">UTC+2</option>
                        <option value="3">UTC+3</option>
                        <option value="4">UTC+4</option>
                        <option value="5">UTC+5</option>
                        <option value="6">UTC+6</option>
                        <option value="7">UTC+7</option>
                        <option value="8" selected>UTC+8</option>
                        <option value="9">UTC+9</option>
                        <option value="10">UTC+10</option>
                        <option value="11">UTC+11</option>
                        <option value="12">UTC+12</option>
                        <option value="-1">UTC-1</option>
                        <option value="-2">UTC-2</option>
                        <option value="-3">UTC-3</option>
                        <option value="-4">UTC-4</option>
                        <option value="-5">UTC-5</option>
                        <option value="-6">UTC-6</option>
                        <option value="-7">UTC-7</option>
                        <option value="-8">UTC-8</option>
                        <option value="-9">UTC-9</option>
                        <option value="-10">UTC-10</option>
                        <option value="-11">UTC-11</option>
                        <option value="-12">UTC-12</option>
                    </select>
                </div>
                <p id="date-display"></p>
            </div>
            <div class="top-right">
                <p>Digital Intelligence Dispatch</p>
            </div>
        </div>
        <div class="container masthead">
            <div class="logo">The Thinking Times</div>
        </div>
        <nav class="container">
            <ul class="nav-links">
                <li>Daily AI News Summary</li>
            </ul>
        </nav>

    </header>

    <main class="container">
        <div class="nyt-layout">
            <!-- Left Column: Tech Intelligence -->
            <div class="column-section left-col">
                <h3 class="section-title">Tech Intelligence</h3>
                <div id="tech-news"></div>
            </div>

            <!-- Center Column: Featured & Global -->
            <div class="column-section center-col">
                <div id="featured-news"></div>
                <hr class="section-divider">
                <h3 class="section-title">Global Dispatch</h3>
                <div id="general-news"></div>
            </div>

            <!-- Right Column: Finance & Markets -->
            <div class="column-section right-col">
                <h3 class="section-title">Finance & Markets</h3>
                <div id="finance-news"></div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 The Thinking Times. Powered by Artificial Intelligence.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
